apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: labs-redirect
  namespace: labs
  labels:
    app.kubernetes.io/part-of: labs
spec:
  hostnames:
    - labs.montevive.ai
  parentRefs:
    - name: montevive
      namespace: envoy-gateway-system
      sectionName: http
  rules:
    - filters:
        - type: RequestRedirect
          requestRedirect:
            scheme: https
            statusCode: 301
